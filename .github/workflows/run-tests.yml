name: Run Unit Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Run Vitest Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Fix Rollup platform binaries
        run: |
          # Force install the Linux-specific Rollup binary
          npm install @rollup/rollup-linux-x64-gnu --no-save --force
          # Rebuild to ensure native modules are compiled for this platform
          npm rebuild

      - name: Run tests
        run: npm run -w web test:run
        env:
          # Database access (required for real integration tests)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          # External API configuration (optional - for integration tests)
          EXTERNAL_API_BASE_URL: ${{ secrets.EXTERNAL_API_BASE_URL }}
          EXTERNAL_OAUTH_REFRESH_URL: ${{ secrets.EXTERNAL_OAUTH_REFRESH_URL }}
          EXTERNAL_TOKENS_ENC_KEY: ${{ secrets.EXTERNAL_TOKENS_ENC_KEY }}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/web/coverage/
          retention-days: 7

