name: Deploy to PROD

on:
  push:
    branches:
      - master
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run migrations on PROD
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_PROD_DB_URL }}
        run: |
          echo "Running Drizzle migrations on PROD database..."
          npm run -w web db:migrate
          echo "✓ Migrations completed successfully"
      
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      
      - name: Deploy Edge Functions to PROD
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Deploying Edge Functions to PROD..."
          supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
          echo "✓ Edge Functions deployed successfully"

